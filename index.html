<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[GGHJ] RO SEA 기획서 허브</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f0f2f5; /* Facebook background */
    margin: 0;
    padding: 80px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .hub-container {
    max-width: 680px;
    width: 100%;
    text-align: center;
  }
  h1 {
    font-size: 28px;
    color: #1877f2; /* Facebook Blue */
    margin-top: 0;
    margin-bottom: 30px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }
  .menu-grid {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .menu-card {
    display: flex;
    align-items: center;
    padding: 20px 24px;
    background: #ffffff;
    border-radius: 8px; /* FB style subtle rounding */
    box-shadow: 0 1px 2px rgba(0,0,0,0.2);
    text-decoration: none;
    color: #1c1e21;
    transition: background 0.2s;
  }
  .menu-card:hover {
    background: #f2f2f2;
  }
  .menu-card.disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }
  .menu-card.disabled:hover {
    background: #ffffff;
  }
  .icon {
    width: 48px;
    height: 48px;
    background: #e4e6eb;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 16px;
    font-size: 24px;
    flex-shrink: 0;
  }
  .card-content {
    text-align: left;
  }
  .card-title {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .card-desc {
    font-size: 14px;
    color: #65676b;
    font-weight: 400;
  }
</style>
</head>
<body>
  <div class="hub-container">
    <h1>[GGHJ] RO SEA 기획서 허브</h1>
    <div class="menu-grid">
      <a href="plan.html" class="menu-card">
        <div class="icon">📝</div>
        <div class="card-content">
            <div class="card-title">기획서 정리 (Plan Document)</div>
            <div class="card-desc">사전예약 이벤트 기획 컨셉 및 정책 명세서</div>
        </div>
      </a>
      <a href="wireframe.html" class="menu-card">
        <div class="icon">🖥️</div>
        <div class="card-content">
            <div class="card-title">사용자 화면 설계 (Storyboard)</div>
            <div class="card-desc">웹사이트 스토리보드 시안</div>
        </div>
      </a>
      <a href="#" class="menu-card disabled">
        <div class="icon">⚙️</div>
        <div class="card-content">
            <div class="card-title">어드민 설계 (Admin Wireframe)</div>
            <div class="card-desc">준비중</div>
        </div>
      </a>
    </div>
  </div>
</body>
</html>
